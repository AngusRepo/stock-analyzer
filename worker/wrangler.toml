name = "stockvision-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = []

[[d1_databases]]
binding = "DB"
database_name = "stockvision-db"
database_id = "6401a5f6-5767-4fa8-a1a7-ec8d4739ac79"

[[kv_namespaces]]
binding = "KV"
id = "39dcebcf5b6848c98f269ef9a48dc3f8"
preview_id = "9d648bfede1246be8cdbfdafa6b7e6f4"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "stockvision-artifacts"
preview_bucket_name = "stockvision-artifacts-preview"

[[queues.producers]]
binding = "UPDATE_QUEUE"
queue = "stockvision-update-queue"

[[queues.producers]]
binding = "NEWS_QUEUE"
queue = "stockvision-news-queue"

[[queues.consumers]]
queue = "stockvision-update-queue"
max_batch_size = 4
max_batch_timeout = 10
max_retries = 2
dead_letter_queue = "stockvision-update-queue-dlq"

[[queues.consumers]]
queue = "stockvision-news-queue"
max_batch_size = 2
max_batch_timeout = 10
max_retries = 2
dead_letter_queue = "stockvision-news-queue-dlq"

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
PAGES_ORIGIN = "https://stockvision-frontend.pages.dev"
DAILY_PRICE_SOURCE = "finlab"
FINLAB_DAILY_PRICE_PRIMARY_ENABLED = "true"
FINLAB_BACKFILL_MODAL_TRIGGER_ENABLED = "true"
FINLAB_BACKFILL_YEARS = "3"
FINLAB_BACKFILL_CANONICAL_WINDOW_DAYS = "7"
FINLAB_BACKFILL_GCS_BUCKET = "stockvision-models"
FINLAB_DAILY_PRICE_CANONICAL_DATASETS = "canonical_market_daily,canonical_chip_daily,canonical_institutional_amount_daily,canonical_broker_flow_daily"
FINLAB_DAILY_PRICE_LANES = "daily_price,emerging_price_diversity,chip_diversity,institutional_amount_summary,emerging_chip_diversity"
FINLAB_L5_MARKET_DATA_ENABLED = "true"
FINLAB_L5_MARKET_DATA_ALLOW_BROKER_LOGIN = "true"
FINLAB_L5_MAX_QUOTE_AGE_MS = "3000"
FINLAB_L5_MAX_SPREAD_PCT = "0.006"
FINLAB_L5_MIN_DEPTH_LEVELS = "5"
FINLAB_L5_MIN_TOP_ASK_VOLUME = "1"
FINLAB_L5_MIN_ORDER_BOOK_IMBALANCE = "-0.7"
FINLAB_L5_ENVELOPE_GUARD_ENABLED = "true"
EXECUTION_WATCH_POOL_SIZE = "10"
EXECUTION_WATCH_MIN_ML_EDGE = "12"
EXECUTION_WATCH_MIN_FINAL_SCORE = "55"
EXECUTION_WATCH_RISK_MULTIPLIER = "0.55"
EXECUTION_CLOSE_WINDOW_MIN_VOLUME_RATIO = "0.9"
FINLAB_EXECUTION_PREVIEW_ENABLED = "false"
FINLAB_EXECUTION_PREVIEW_ALLOW_BROKER_LOGIN = "false"
FINLAB_EXECUTION_PREVIEW_GUARD_ENABLED = "false"
INTRADAY_DYNAMIC_TECHNICAL_GUARD_ENABLED = "true"
INTRADAY_TECHNICAL_BAR_INTERVAL_MS = "30000"
INTRADAY_TECHNICAL_BAR_LOOKBACK = "40"
INTRADAY_TECHNICAL_DISTRIBUTION_SKIP_MIN_BARS = "60"
