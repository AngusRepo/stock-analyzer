name = "stockvision-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = []

[[d1_databases]]
binding = "DB"
database_name = "stockvision-db"
database_id = "6401a5f6-5767-4fa8-a1a7-ec8d4739ac79"

[[kv_namespaces]]
binding = "KV"
id = "39dcebcf5b6848c98f269ef9a48dc3f8"
preview_id = "9d648bfede1246be8cdbfdafa6b7e6f4"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "stockvision-artifacts"
preview_bucket_name = "stockvision-artifacts-preview"

[[queues.producers]]
binding = "UPDATE_QUEUE"
queue = "stockvision-update-queue"

[[queues.producers]]
binding = "NEWS_QUEUE"
queue = "stockvision-news-queue"

[[queues.consumers]]
queue = "stockvision-update-queue"
max_batch_size = 4
max_batch_timeout = 10
max_retries = 2
dead_letter_queue = "stockvision-update-queue-dlq"

[[queues.consumers]]
queue = "stockvision-news-queue"
max_batch_size = 2
max_batch_timeout = 10
max_retries = 2
dead_letter_queue = "stockvision-news-queue-dlq"

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
PAGES_ORIGIN = "https://stockvision-frontend.pages.dev"
DAILY_PRICE_SOURCE = "finlab"
FINLAB_DAILY_PRICE_PRIMARY_ENABLED = "true"
FINLAB_BACKFILL_MODAL_TRIGGER_ENABLED = "true"
FINLAB_BACKFILL_YEARS = "3"
FINLAB_BACKFILL_CANONICAL_WINDOW_DAYS = "7"
FINLAB_BACKFILL_GCS_BUCKET = "stockvision-models"
FINLAB_DAILY_PRICE_CANONICAL_DATASETS = "canonical_market_daily"
FINLAB_DAILY_PRICE_LANES = "daily_price,emerging_price_diversity"
