name = "stockvision-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "stockvision-db"
database_id = "6401a5f6-5767-4fa8-a1a7-ec8d4739ac79"

[[kv_namespaces]]
binding = "KV"
id = "39dcebcf5b6848c98f269ef9a48dc3f8"
preview_id = "9d648bfede1246be8cdbfdafa6b7e6f4"

[[queues.producers]]
binding = "UPDATE_QUEUE"
queue = "stockvision-update-queue"

[[queues.consumers]]
queue = "stockvision-update-queue"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 2
dead_letter_queue = "stockvision-update-queue-dlq"

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
PAGES_ORIGIN = "https://stockvision-frontend.pages.dev"

[triggers]
crons = [
  # Intraday trading window, TW 09:00-13:30.
  "* 1-5 * * 1-5",
  "25 5 * * 1-5",

  # Intraday ML re-score, TW 10:00 / 11:00 / 12:00 / 12:30.
  "0 2 * * 1-5",
  "0 3 * * 1-5",
  "0 4 * * 1-5",
  "30 4 * * 1-5",

  # Daily close pipeline, TW afternoon/evening.
  "20 6 * * 1-5",
  "15 9 * * 1-5",
  "30 9 * * 1-5",
  "20 10 * * 1-5",
  "25 10 * * 1-5",
  "30 10 * * 5",
  "40 10 * * 1-5",
  "50 10 * * 1-5",
  "0 11 * * 1-5",
  "30 11 * * 5",

  # Morning setup window, TW 06:30-08:50.
  "30 22 * * SUN-THU",
  "45 22 * * SUN-THU",
  "15 23 * * SUN-THU",
  "50 23 * * SUN-THU",
  "50 0 * * 1-5",

  # Weekly/monthly maintenance.
  "0 20 * * 6",
  "0 22 * * 6",
  "30 22 * * 6",

  # Daily retention and Optuna queue drain.
  "0 19 * * *",
  "0 */6 * * *",
]
