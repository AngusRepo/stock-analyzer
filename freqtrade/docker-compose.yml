version: '3.8'

services:
  freqtrade:
    build: .
    env_file:
      - .env
    volumes:
      - ./strategies:/freqtrade/user_data/strategies
      - ./scripts:/freqtrade/scripts
      - ./user_data/data:/freqtrade/user_data/data
      - ./user_data/backtest_results:/freqtrade/user_data/backtest_results
      - ./user_data/hyperopt_results:/freqtrade/user_data/hyperopt_results
      - ./user_data/walk_forward_results:/freqtrade/user_data/walk_forward_results
    environment:
      # Cloudflare D1 REST API
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - CF_D1_DB_ID=${CF_D1_DB_ID}
      - CF_API_TOKEN=${CF_API_TOKEN}
      # StockVision Worker
      - STOCKVISION_API=${STOCKVISION_API}
      - STOCKVISION_TOKEN=${STOCKVISION_TOKEN}
    entrypoint: [""]
    command: ["bash"]
    stdin_open: true
    tty: true
