name = "stockvision-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "stockvision-db"
database_id = "6401a5f6-5767-4fa8-a1a7-ec8d4739ac79"

[[kv_namespaces]]
binding = "KV"
id = "39dcebcf5b6848c98f269ef9a48dc3f8"
preview_id = "9d648bfede1246be8cdbfdafa6b7e6f4"

# ── Cloudflare Queues（斷點續傳用）──────────────────────────────────────────
# 建立指令（deploy.sh 已自動執行）：
#   wrangler queues create stockvision-update-queue
#   wrangler queues create stockvision-ml-queue

[[queues.producers]]
binding  = "UPDATE_QUEUE"
queue    = "stockvision-update-queue"

[[queues.consumers]]
queue              = "stockvision-update-queue"
max_batch_size     = 1   # 每次取 1 則訊息（1 批股票）
max_batch_timeout  = 5   # 最多等 5 秒湊批
max_retries        = 2   # 失敗重試 2 次
dead_letter_queue  = "stockvision-update-queue-dlq"
# ML_QUEUE removed in Phase 3 — ML batch predict now goes through Controller

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
ML_SERVICE_URL = "https://wayne60619--stockvision-ml-fastapi-app.modal.run"
# Phase 3 MVC: Cloud Run ML Controller（部署後填入）
# ML_CONTROLLER_URL = "https://ml-controller-xxx.a.run.app"
# 前端 Pages 精確 URL（部署完成後填入，用於 CORS 白名單）
PAGES_ORIGIN = "https://stockvision-frontend.pages.dev"

# 以下 secrets 請用 wrangler secret put 設定：
# wrangler secret put JWT_SECRET
# wrangler secret put GOOGLE_CLIENT_ID
# wrangler secret put GOOGLE_CLIENT_SECRET
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put FINMIND_TOKEN
# wrangler secret put RESEND_API_KEY       ← Resend.com 免費帳號，100封/天
# wrangler secret put ADMIN_EMAIL          ← Bootstrap admin email（第一次登入自動成為 admin）
# wrangler secret put ML_SERVICE_SECRET    ← 與 Cloud Run 共享密鑰
# wrangler secret put STOCKVISION_AUTH_TOKEN ← 與 AI Team Worker 共享（Paper Trading auth）
# （PAGES_ORIGIN 填在上方 [vars]，不需要 secret）

[triggers]
crons = [
  # ── 盤中（TW 09:00-13:30）──
  "* 1-5 * * 1-5",   # 盤中每分鐘：限價買入 + 止損停利巡檢
  "25 5 * * 1-5",    # 13:25 TW → EOD 收盤前出場檢查

  # ── 收盤後 Pipeline（TW 14:20 + 17:30-18:30）──
  # 法人買賣超（T86）約 17:00 TW 才完整，15:05 抓到的是空的
  "20 6 * * 1-5",    # 14:20 TW → Daily Snapshot（收盤後立即算 PnL，不需 chip）
  "30 9 * * 1-5",    # 17:30 TW → Bulk Fetch（全市場股價+籌碼，via Controller proxy）
  "40 9 * * 1-5",    # 17:40 TW → Screener T1+T2（chip 齊全後篩選）
  "50 9 * * 1-5",    # 17:50 TW → ML 預熱（喚醒 Cloud Run）
  "0 10 * * 1-5",    # 18:00 TW → ML 預測 + 大盤風險
  "5 10 * * 1-5",    # 18:05 TW → Recommendation（評分）
  "15 10 * * 1-5",   # 18:15 TW → 預測驗證 + 準確率更新
  "20 10 * * 1-5",   # 18:20 TW → Adaptive Engine
  "25 10 * * 1-5",   # 18:25 TW → 收盤報告推送 Discord

  # ── 次日盤前（TW 06:30-07:50）──
  # TW 週一 06:30 = UTC 週日 22:30 → 必須含 Sun(0)，否則週一早上不觸發
  "30 22 * * SUN-THU",   # 06:30 TW (=UTC Sun-Thu 22:30) → 美股先行指標
  "15 23 * * SUN-THU",   # 07:15 TW (=UTC Sun-Thu 23:15) → Morning Setup（Debate + 掛單）
  "50 23 * * SUN-THU",   # 07:50 TW (=UTC Sun-Thu 23:50) → 盤前攻略 Discord

  # ── 週末維護 ──
  "0 20 * * 6",      # 週六 04:00 TW → D1 清理 + Retrain + IC Audit
]

# ── 選配：Cron 失敗 Telegram 通知 ─────────────────────────────────────────────
# 設定後，Cron 失敗會自動推播到你的 Telegram
# 在 Cloudflare Dashboard > Workers > Settings > Variables 設定（不要放在這裡）
# TELEGRAM_BOT_TOKEN = "你的 Bot Token"
# TELEGRAM_CHAT_ID   = "你的 Chat ID"
