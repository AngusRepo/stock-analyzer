version: '3.8'

services:
  freqtrade:
    build: .
    volumes:
      - ./strategies:/freqtrade/user_data/strategies
      - ./scripts:/freqtrade/scripts
      - ./user_data/data:/freqtrade/user_data/data
      - ./user_data/backtest_results:/freqtrade/user_data/backtest_results
    environment:
      # Cloudflare D1 REST API
      - CF_ACCOUNT_ID=619a83ac9f20847d9e2f2920823b727d
      - CF_D1_DB_ID=6401a5f6-5767-4fa8-a1a7-ec8d4739ac79
      - CF_API_TOKEN=${CF_API_TOKEN}
      # StockVision Worker
      - STOCKVISION_API=https://stockvision-worker.angus-solo-dev.workers.dev
      - STOCKVISION_TOKEN=${STOCKVISION_TOKEN}
    entrypoint: [""]
    command: ["bash"]
    stdin_open: true
    tty: true
